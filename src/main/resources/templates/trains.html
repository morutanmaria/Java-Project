<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Trains</title>
</head>
<body>

<h1>Trains</h1>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Train Number</th>
        <th>Seats</th>
    </tr>

    <tr th:each="train : ${trains}">
        <td th:text="${train.id}"></td>
        <td th:text="${train.name}"></td>
        <td th:text="${train.trainNumber}"></td>
        <td th:text="${train.totalSeats}"></td>
    </tr>

</table>

</body>
</html>

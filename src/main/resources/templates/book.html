<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Book Tickets')}"></head>
<body>
<nav th:replace="~{fragments :: nav('bookings')}"></nav>
<div class="page">
    <div class="page-header">
        <div class="page-title">Book Tickets</div>
        <div class="page-subtitle">Select a schedule and number of seats</div>
    </div>

    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <div class="card" style="max-width:560px">
        <form th:action="@{/bookings}" method="post">
            <div class="form-grid">
                <div class="form-group">
                    <label class="form-label">Schedule</label>
                    <select class="form-control" name="scheduleId" required>
                        <option value="">Select a schedule…</option>
                        <option th:each="s : ${schedules}"
                                th:value="${s.id}"
                                th:selected="${preselectedScheduleId != null and preselectedScheduleId == s.id}"
                                th:text="${s.train.name + ' | ' + s.route.source + ' → ' + s.route.destination + ' | ' + #temporals.format(s.departureTime,'dd MMM HH:mm') + ' | ' + s.availableSeats + ' seats'}">
                        </option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Number of Seats</label>
                    <input class="form-control" type="number" name="seatsBooked" min="1" value="1" required/>
                </div>
            </div>
            <div class="mt-3 flex flex-gap">
                <button type="submit" class="btn btn-primary">Confirm Booking</button>
                <a href="/bookings" class="btn btn-outline">Cancel</a>
            </div>
        </form>
    </div>

    <div class="alert alert-info mt-3" style="max-width:560px">
        A confirmation email will be sent to your registered email address after booking.
    </div>
</div>
</body>
</html>

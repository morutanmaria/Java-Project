<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Register — RailApp</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --navy:#0d1b2a; --navy2:#132238; --navy3:#1c3051; --gold:#c9a84c; --gold2:#e8c76a; --cream:#f5f0e8; --muted:#8a9bb5; --danger:#e05252; --border:rgba(201,168,76,0.18); }
        body { font-family:'DM Sans',sans-serif; background:var(--navy); color:var(--cream); min-height:100vh; display:flex; align-items:center; justify-content:center; }
        .wrap { width:100%; max-width:440px; padding:1rem; }
        .brand { text-align:center; margin-bottom:2rem; }
        .brand-icon { font-size:2.5rem; display:block; margin-bottom:0.4rem; }
        .brand-name { font-family:'Playfair Display',serif; font-size:1.8rem; color:var(--gold); }
        .card { background:var(--navy2); border:1px solid var(--border); border-radius:12px; padding:2rem; box-shadow:0 8px 40px rgba(0,0,0,0.4); }
        .card-title { font-family:'Playfair Display',serif; font-size:1.3rem; color:var(--cream); margin-bottom:1.5rem; }
        .form-group { margin-bottom:1rem; }
        .form-label { display:block; color:var(--muted); font-size:0.8rem; font-weight:500; text-transform:uppercase; letter-spacing:0.05em; margin-bottom:0.4rem; }
        .form-control { width:100%; background:var(--navy3); border:1px solid var(--border); border-radius:7px; color:var(--cream); padding:0.65rem 0.9rem; font-family:'DM Sans',sans-serif; font-size:0.9rem; transition:border-color 0.2s; }
        .form-control:focus { outline:none; border-color:var(--gold); }
        .btn-submit { width:100%; background:var(--gold); color:var(--navy); border:none; border-radius:7px; padding:0.75rem; font-family:'DM Sans',sans-serif; font-size:0.95rem; font-weight:600; cursor:pointer; transition:background 0.2s; margin-top:0.5rem; }
        .btn-submit:hover { background:var(--gold2); }
        .footer-link { text-align:center; margin-top:1.25rem; color:var(--muted); font-size:0.88rem; }
        .footer-link a { color:var(--gold); text-decoration:none; font-weight:500; }
        .alert-error { background:rgba(224,82,82,0.12); color:#f08080; border:1px solid rgba(224,82,82,0.3); border-radius:7px; padding:0.7rem 1rem; font-size:0.85rem; margin-bottom:1rem; }
    </style>
</head>
<body>
<div class="wrap">
    <div class="brand">
        <span class="brand-icon">🚂</span>
        <div class="brand-name">RailApp</div>
    </div>
    <div class="card">
        <div class="card-title">Create an account</div>
        <div class="alert-error" th:if="${error}" th:text="${error}"></div>
        <form th:action="@{/register}" method="post">
            <div class="form-group">
                <label class="form-label">Full Name</label>
                <input class="form-control" type="text" name="name" placeholder="Jane Smith" autofocus/>
            </div>
            <div class="form-group">
                <label class="form-label">Email</label>
                <input class="form-control" type="text" name="email" placeholder="jane@example.com"/>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input class="form-control" type="password" name="password" placeholder="••••••••"/>
            </div>
            <button class="btn-submit" type="submit">Create Account</button>
        </form>
    </div>
    <div class="footer-link">Already have an account? <a href="/login">Sign in</a></div>
</div>
</body>
</html>
